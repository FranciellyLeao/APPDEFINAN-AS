<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinAI</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Ctext y="50" font-size="52"%3E🐷%3C/text%3E%3C/svg%3E'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#081018;
      --surface:rgba(16,28,41,.82);
      --border:rgba(181,217,255,.10);
      --text:#eff7ff;
      --muted:#91a7bb;
      --soft:#c8d7e5;
      --accent:#49c6ff;
      --green:#67f0aa;
      --red:#ff7c7c;
      --yellow:#ffcc66;
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }

    html,body{
      height:100%;
      font-family:'Manrope',sans-serif;
      background:
        radial-gradient(circle at top left, rgba(73,198,255,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(0,224,184,.10), transparent 24%),
        linear-gradient(180deg, #071018 0%, #09131d 40%, #081018 100%);
      color:var(--text);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size:24px 24px;
      mask-image:linear-gradient(180deg, rgba(255,255,255,.22), transparent 80%);
      pointer-events:none;
    }

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:999px}

    .app{
      width:100%;
      max-width:430px;
      height:100vh;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      position:relative;
      z-index:1;
    }

    .header{
      padding:22px 20px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-shrink:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:
        linear-gradient(135deg, rgba(73,198,255,.28), rgba(0,224,184,.15)),
        rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .brand-copy h1{
      font-size:18px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .brand-copy p{
      font-size:11px;
      color:var(--muted);
      margin-top:2px;
    }

    .month-pill{
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      font-size:11px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .hero{
      margin:0 20px 14px;
      padding:18px;
      border-radius:28px;
      background:
        radial-gradient(circle at top left, rgba(73,198,255,.18), transparent 35%),
        linear-gradient(145deg, rgba(20,37,53,.96), rgba(12,24,36,.96));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      flex-shrink:0;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:auto -20% -45% auto;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(0,224,184,.16), transparent 65%);
      pointer-events:none;
    }

    .hero-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }

    .hero-label{
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .hero-balance{
      font-size:34px;
      line-height:1;
      letter-spacing:-.05em;
      font-weight:800;
    }

    .hero-badge{
      padding:10px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      font-size:11px;
      color:var(--soft);
      min-width:92px;
      text-align:center;
    }

    .hero-badge strong{
      display:block;
      font-size:16px;
      color:var(--text);
      margin-top:2px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .metric{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      backdrop-filter:blur(10px);
    }

    .metric span{
      display:block;
      font-size:11px;
      color:var(--muted);
      margin-bottom:5px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:700;
    }

    .metric strong{
      font-size:15px;
      font-weight:800;
    }

    .quick-panels{
      padding:0 20px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      flex-shrink:0;
      margin-bottom:12px;
    }

    .panel-mini{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .panel-mini .mini-label{
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .panel-mini .mini-value{
      font-size:14px;
      font-weight:800;
    }

    .nav{
      padding:0 20px 12px;
      flex-shrink:0;
    }

    .nav-inner{
      display:flex;
      gap:6px;
      padding:6px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow);
    }

    .nav-btn{
      flex:1;
      border:none;
      background:transparent;
      color:var(--muted);
      font-family:'Manrope',sans-serif;
      font-size:11px;
      font-weight:700;
      padding:11px 6px;
      border-radius:14px;
      cursor:pointer;
      transition:.2s ease;
    }

    .nav-btn.active{
      background:linear-gradient(135deg, rgba(73,198,255,.18), rgba(255,255,255,.05));
      color:var(--text);
      border:1px solid rgba(73,198,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .content{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:0 20px;
    }

    .section-tag{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin:6px 0 10px;
    }

    .accordion{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:20px;
      margin:0 20px 10px;
      overflow:hidden;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }

    .acc-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px;
      cursor:pointer;
      gap:12px;
    }

    .acc-title{
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .acc-arrow{
      color:var(--muted);
      font-size:11px;
      transition:transform .2s ease;
    }

    .acc-arrow.open{transform:rotate(180deg)}

    .acc-body{
      display:none;
      padding:0 16px 14px;
    }

    .acc-body.open{display:block}

    .cat-item,.tx-item{
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .cat-item:last-child,.tx-item:last-child{border-bottom:none}

    .cat-item{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .cat-icon,.tx-ico{
      width:34px;
      height:34px;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      font-size:16px;
    }

    .cat-name{
      flex:1;
      font-size:13px;
      font-weight:700;
      text-transform:capitalize;
    }

    .cat-val{
      font-size:12px;
      font-weight:800;
      color:var(--red);
    }

    .cat-pct{
      min-width:34px;
      text-align:right;
      font-size:10px;
      color:var(--muted);
      font-weight:700;
    }

    .tx-item{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .tx-main{
      flex:1;
      min-width:0;
    }

    .tx-desc{
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .tx-meta{
      font-size:10px;
      color:var(--muted);
      margin-top:3px;
      text-transform:capitalize;
      letter-spacing:.03em;
    }

    .tx-right{
      display:flex;
      align-items:center;
      gap:8px;
      margin-left:auto;
    }

    .tx-amount{
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .tx-del,.goal-del{
      width:28px;
      height:28px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,.04);
      color:var(--muted);
      cursor:pointer;
      font-size:14px;
    }

    .chat-shell{
      padding-bottom:104px;
    }

    .chat-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-bottom:12px;
    }

    .msg{
      display:flex;
      gap:8px;
      align-items:flex-end;
    }

    .msg.user{
      justify-content:flex-end;
    }

    .msg-av{
      width:28px;
      height:28px;
      border-radius:11px;
      background:linear-gradient(135deg, rgba(73,198,255,.20), rgba(0,224,184,.14));
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      flex-shrink:0;
      margin-bottom:2px;
    }

    .msg-bubble{
      max-width:84%;
      padding:13px 15px;
      border-radius:18px;
      font-size:13px;
      line-height:1.65;
      box-shadow:var(--shadow);
    }

    .msg.bot .msg-bubble{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text);
      border-bottom-left-radius:6px;
    }

    .msg.user .msg-bubble{
      background:linear-gradient(135deg, #23b6ff, #1fd2d2);
      color:#071018;
      font-weight:700;
      border-bottom-right-radius:6px;
    }

    .typing{
      display:flex;
      gap:4px;
      padding:4px 2px;
    }

    .dot{
      width:5px;
      height:5px;
      border-radius:50%;
      background:var(--muted);
      animation:pulse 1s infinite;
    }

    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}

    .confirm-wrap{
      background:linear-gradient(145deg, rgba(17,33,48,.95), rgba(13,24,36,.95));
      border:1px solid rgba(73,198,255,.16);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:2px;
    }

    .confirm-lbl{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .confirm-body{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .confirm-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      flex-shrink:0;
    }

    .confirm-amt{
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .confirm-cat{
      font-size:11px;
      color:var(--muted);
      margin-top:3px;
      text-transform:capitalize;
    }

    .btn-row{
      display:flex;
      gap:8px;
    }

    .cbtn{
      flex:1;
      border:none;
      border-radius:14px;
      padding:11px;
      font-family:'Manrope',sans-serif;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .cbtn-ok{
      background:linear-gradient(135deg, #64f3b3, #39d49d);
      color:#072014;
    }

    .cbtn-no{
      background:rgba(255,255,255,.06);
      color:var(--soft);
      border:1px solid rgba(255,255,255,.06);
    }

    .goal-item,.saude-card,.parcel-card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:22px;
      padding:16px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .goal-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }

    .goal-info{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .goal-ico{
      width:42px;
      height:42px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      flex-shrink:0;
    }

    .goal-name{
      font-size:14px;
      font-weight:800;
    }

    .goal-rem{
      font-size:11px;
      color:var(--muted);
      margin-top:3px;
    }

    .goal-pct{
      font-size:14px;
      font-weight:800;
      white-space:nowrap;
    }

    .goal-bar{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      margin-bottom:10px;
    }

    .goal-fill{
      height:100%;
      border-radius:999px;
      transition:width .6s ease;
    }

    .goal-nums{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:11px;
      color:var(--muted);
      font-weight:700;
    }

    .parcel-actions{
      display:flex;
      gap:8px;
      margin-top:12px;
    }

    .parcel-btn{
      flex:1;
      border:none;
      border-radius:14px;
      padding:10px 12px;
      font-family:'Manrope',sans-serif;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      background:rgba(255,255,255,.06);
      color:var(--text);
    }

    .parcel-btn.primary{
      background:linear-gradient(135deg, rgba(255,204,102,.30), rgba(255,204,102,.16));
      color:#fff3c7;
      border:1px solid rgba(255,204,102,.18);
    }

    .parcel-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .add-btn,.gerar-btn,.submit{
      width:100%;
      border:none;
      border-radius:16px;
      padding:13px 14px;
      font-family:'Manrope',sans-serif;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .add-btn{
      margin-bottom:92px;
      background:rgba(255,255,255,.05);
      color:var(--text);
      border:1px dashed rgba(255,255,255,.14);
    }

    .saude-title{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:12px;
    }

    .saude-row{
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }

    .saude-half{
      flex:1;
    }

    .saude-lbl{
      font-size:11px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }

    .saude-input,.field input{
      width:100%;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 13px;
      color:var(--text);
      font-family:'Manrope',sans-serif;
      font-size:13px;
      outline:none;
    }

    .saude-input:focus,.field input:focus{
      border-color:rgba(73,198,255,.38);
      box-shadow:0 0 0 4px rgba(73,198,255,.08);
    }

    .stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:10px;
    }

    .stat-box{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .stat-lbl{
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:5px;
    }

    .stat-val{
      font-size:18px;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .stat-sub{
      font-size:10px;
      color:var(--muted);
      margin-top:4px;
      font-weight:700;
    }

    .alert-box{
      padding:13px 14px;
      border-radius:16px;
      font-size:12px;
      line-height:1.5;
      margin-bottom:8px;
      font-weight:700;
    }

    .alert-ok{
      background:rgba(103,240,170,.08);
      color:var(--green);
      border:1px solid rgba(103,240,170,.16);
    }

    .alert-warn{
      background:rgba(255,204,102,.08);
      color:var(--yellow);
      border:1px solid rgba(255,204,102,.16);
    }

    .alert-danger{
      background:rgba(255,124,124,.08);
      color:var(--red);
      border:1px solid rgba(255,124,124,.16);
    }

    .dica-card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:16px;
      padding:13px 14px;
      font-size:12px;
      line-height:1.6;
      color:var(--soft);
      margin-bottom:8px;
    }

    .dica-loading,.empty{
      text-align:center;
      padding:24px 16px;
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
    }

    .empty-icon{
      font-size:28px;
      margin-bottom:8px;
      opacity:.6;
    }

    .gerar-btn{
      background:linear-gradient(135deg, rgba(73,198,255,.20), rgba(0,224,184,.14));
      color:var(--text);
      border:1px solid rgba(73,198,255,.16);
      margin-top:4px;
    }

    .gerar-btn:disabled{opacity:.5;cursor:default}

    .input-bar{
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:430px;
      padding:10px 20px 18px;
      background:linear-gradient(180deg, transparent, rgba(8,16,24,.88) 24%, rgba(8,16,24,.96) 60%);
      z-index:10;
    }

    .input-inner{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 8px 8px 14px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .input-inner input{
      flex:1;
      border:none;
      background:none;
      color:var(--text);
      font-family:'Manrope',sans-serif;
      font-size:13px;
      outline:none;
    }

    .input-inner input::placeholder{color:var(--muted)}

    .send{
      width:38px;
      height:38px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg, rgba(73,198,255,.45), rgba(0,224,184,.45));
      color:#05121b;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      opacity:.45;
      transition:.2s ease;
    }

    .send.on{
      opacity:1;
      transform:translateY(-1px);
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(3,10,16,.72);
      backdrop-filter:blur(8px);
      z-index:100;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .modal{
      width:100%;
      max-width:430px;
      background:linear-gradient(180deg, rgba(15,28,42,.98), rgba(10,20,30,.98));
      border:1px solid rgba(255,255,255,.08);
      border-bottom:none;
      border-radius:28px 28px 0 0;
      padding:22px 20px 34px;
      box-shadow:var(--shadow);
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }

    .modal-title{
      font-size:16px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .close-btn{
      width:30px;
      height:30px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      color:var(--text);
      cursor:pointer;
      font-size:14px;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.08em;
    }

    .emo-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .emo{
      width:38px;
      height:38px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      font-size:18px;
    }

    .emo.on{
      border-color:rgba(73,198,255,.26);
      background:rgba(73,198,255,.10);
    }

    .submit{
      background:linear-gradient(135deg, #29bbff, #18d6cb);
      color:#04141d;
      margin-top:6px;
    }

    @keyframes pulse{
      0%,100%{opacity:.2;transform:scale(.8)}
      50%{opacity:1;transform:scale(1)}
    }

    @media (max-width:390px){
      .hero-balance{font-size:29px}
      .month-pill{display:none}
      .hero-grid,.stat-grid,.quick-panels{grid-template-columns:1fr}
      .saude-row{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="brand-mark">✦</div>
        <div class="brand-copy">
          <h1>FinAI</h1>
          <p>Seu painel financeiro pessoal</p>
        </div>
      </div>
      <div class="month-pill" id="month-lbl"></div>
    </div>

    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="hero-label">Saldo Atual</div>
          <div class="hero-balance" id="bal-disp">R$ 0,00</div>
        </div>
        <div class="hero-badge">
          Mês
          <strong id="hero-day">00</strong>
        </div>
      </div>
      <div class="hero-grid">
        <div class="metric">
          <span>Entradas</span>
          <strong id="inc-disp" style="color:var(--green)">R$ 0,00</strong>
        </div>
        <div class="metric">
          <span>Saídas</span>
          <strong id="exp-disp" style="color:var(--red)">R$ 0,00</strong>
        </div>
      </div>
    </div>

    <div class="quick-panels">
      <div class="panel-mini">
        <div class="mini-label">Movimentos</div>
        <div class="mini-value" id="tx-count">0 transações</div>
      </div>
      <div class="panel-mini">
        <div class="mini-label">Metas</div>
        <div class="mini-value" id="goal-count">0 ativas</div>
      </div>
    </div>

    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('gastos')">
        <div class="acc-title">📊 Gastos por categoria</div>
        <div class="acc-arrow" id="arr-gastos">▼</div>
      </div>
      <div class="acc-body" id="body-gastos"></div>
    </div>

    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('transacoes')">
        <div class="acc-title">💸 Transações</div>
        <div class="acc-arrow" id="arr-transacoes">▼</div>
      </div>
      <div class="acc-body" id="body-transacoes"></div>
    </div>

    <div class="nav">
      <div class="nav-inner">
        <button class="nav-btn active" id="tab-chat" onclick="go('chat')">Chat</button>
        <button class="nav-btn" id="tab-metas" onclick="go('metas')">Metas</button>
        <button class="nav-btn" id="tab-saude" onclick="go('saude')">Saúde</button>
        <button class="nav-btn" id="tab-parcelas" onclick="go('parcelas')">Parcelas</button>
      </div>
    </div>

    <div class="content" id="content"></div>

    <div class="input-bar" id="input-bar">
      <div class="input-inner">
        <input id="chat-in" placeholder='"Gastei R$45 no almoço"' onkeydown="if(event.key==='Enter')send()" oninput="toggleSend(this.value)">
        <button class="send" id="send-btn" onclick="send()">↑</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="goal-modal" style="display:none" onclick="if(event.target===this)closeGoal()">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">Nova meta</div>
        <button class="close-btn" onclick="closeGoal()">×</button>
      </div>
      <div class="field">
        <label>NOME</label>
        <input id="g-name" placeholder="Ex: Viagem, notebook, reserva...">
      </div>
      <div class="field">
        <label>VALOR ALVO (R$)</label>
        <input id="g-target" type="number" placeholder="10000">
      </div>
      <div class="field">
        <label>JÁ GUARDEI (R$)</label>
        <input id="g-cur" type="number" placeholder="0">
      </div>
      <div class="field">
        <label>ÍCONE</label>
        <div class="emo-row" id="emo-grid"></div>
      </div>
      <button class="submit" onclick="saveGoal()">Criar meta</button>
    </div>
  </div>

  <script>
    const KEY='finai_v7';
    const EMOJIS=['✈️','🛡️','💻','🏠','🚗','📱','🎓','💰','🏖️','🎸','🌍','🐶','🎮','💍','🏋️'];
    const CATS={alimentação:'🍔',transporte:'🚗',lazer:'🎮',saúde:'💊',moradia:'🏠',educação:'📚',salário:'💼',freelance:'💻',investimento:'📈',outros:'✨'};
    const COLORS=['#67F0AA','#49C6FF','#FF8FA3','#FDBA74','#A78BFA','#2DD4BF','#FACC15'];

    let data=load(),tab='chat';
    let msgs=[{r:'bot',t:'Oi! Eu posso registrar seus gastos e ganhos rapidinho.\n\nEx: *"Gastei R$45 no almoço"*, *"Ganhei R$250 no freela"* ou *"Paguei 3x de 120 no celular"*'}];
    let pending=null,loading=false,selEmo='✈️',dicasLoading=false;
    let accOpen={gastos:false,transacoes:false};

    function load(){
      try{
        const r=localStorage.getItem(KEY);
        if(r)return JSON.parse(r);
      }catch(e){}
      return{transactions:[],goals:[],renda:0,limiteGastos:0};
    }

    function save(){localStorage.setItem(KEY,JSON.stringify(data))}
    const fmt=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    const today=()=>new Date().toISOString().split('T')[0];
    const diasNoMes=()=>new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
    const diaAtual=()=>new Date().getDate();

    function monthlyExpenseValue(t){
      return t.isInstallment ? (t.installmentAmount || t.amount) : t.amount;
    }

    function totals(){
      const inc=data.transactions
        .filter(t=>t.type==='income')
        .reduce((s,t)=>s+t.amount,0);

      const exp=data.transactions
        .filter(t=>t.type==='expense')
        .reduce((s,t)=>s+monthlyExpenseValue(t),0);

      return{inc,exp,bal:inc-exp};
    }

    function updateHeader(){
      const now=new Date();
      document.getElementById('month-lbl').textContent=now.toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
      document.getElementById('hero-day').textContent=String(now.getDate()).padStart(2,'0');

      const {inc,exp,bal}=totals();
      const bd=document.getElementById('bal-disp');
      bd.textContent=fmt(bal);
      bd.style.color=bal>=0?'var(--text)':'var(--red)';

      document.getElementById('inc-disp').textContent=fmt(inc);
      document.getElementById('exp-disp').textContent=fmt(exp);
      document.getElementById('tx-count').textContent=`${data.transactions.length} ${data.transactions.length===1?'transação':'transações'}`;
      document.getElementById('goal-count').textContent=`${data.goals.length} ${data.goals.length===1?'ativa':'ativas'}`;

      renderAccordions();
    }

    function go(t){
      tab=t;
      ['chat','metas','saude','parcelas'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===t));
      document.getElementById('input-bar').style.display=t==='chat'?'block':'none';
      render();
    }

    function render(){
      const el=document.getElementById('content');
      if(tab==='chat') el.innerHTML=renderChat();
      else if(tab==='metas') el.innerHTML=renderMetas();
      else if(tab==='saude') el.innerHTML=renderSaude();
      else el.innerHTML=renderParcelas();

      renderAccordions();
      if(tab==='chat') scrollEnd();
    }

    function renderAccordions(){
      const expByCat=data.transactions
        .filter(t=>t.type==='expense')
        .reduce((a,t)=>{
          a[t.category]=(a[t.category]||0)+monthlyExpenseValue(t);
          return a;
        },{});

      const total=Object.values(expByCat).reduce((s,v)=>s+v,0)||1;

      const catRows=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
        <div class="cat-item">
          <div class="cat-icon">${CATS[cat]||'✨'}</div>
          <div class="cat-name">${cat}</div>
          <div class="cat-val">${fmt(amt)}</div>
          <div class="cat-pct">${Math.round(amt/total*100)}%</div>
        </div>`).join('')||`<div class="empty">Nenhum gasto ainda.</div>`;

      const recent=[...data.transactions].reverse().slice(0,10);
      const txRows=recent.map(t=>{
        const valor=t.type==='expense' ? monthlyExpenseValue(t) : t.amount;
        const etiqueta=t.isInstallment ? ` · ${t.installmentCurrent||1}/${t.installments||1}` : '';
        return `
          <div class="tx-item">
            <div class="tx-ico">${CATS[t.category]||'✨'}</div>
            <div class="tx-main">
              <div class="tx-desc">${t.description}</div>
              <div class="tx-meta">${t.category}${etiqueta} · ${new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div>
            </div>
            <div class="tx-right">
              <div class="tx-amount" style="color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}${fmt(valor)}</div>
              <button class="tx-del" onclick="delTx(${t.id})">×</button>
            </div>
          </div>`;
      }).join('')||`<div class="empty">Nenhuma transação ainda.</div>`;

      const bg=document.getElementById('body-gastos');
      const bt=document.getElementById('body-transacoes');
      if(bg) bg.innerHTML=catRows;
      if(bt) bt.innerHTML=txRows;
    }

    function renderChat(){
      let conf='';
      if(pending){
        const pendingAmount=pending.type==='expense' ? monthlyExpenseValue(pending) : pending.amount;
        conf=`<div class="confirm-wrap">
          <div class="confirm-lbl">Confirmar registro</div>
          <div class="confirm-body">
            <div class="confirm-icon">${CATS[pending.category]||'✨'}</div>
            <div>
              <div class="confirm-amt" style="color:${pending.type==='income'?'var(--green)':'var(--red)'}">${pending.type==='income'?'+':'-'}${fmt(pendingAmount)}</div>
              <div class="confirm-cat">${pending.category} · ${pending.description.slice(0,38)}</div>
            </div>
          </div>
          <div class="btn-row">
            <button class="cbtn cbtn-ok" onclick="okTx()">Confirmar</button>
            <button class="cbtn cbtn-no" onclick="nopeTx()">Cancelar</button>
          </div>
        </div>`;
      }

      const bubbles=msgs.map(m=>{
        if(m.r==='typing') return `<div class="msg bot"><div class="msg-av">✦</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
        return `<div class="msg ${m.r==='user'?'user':'bot'}">
          ${m.r!=='user'?'<div class="msg-av">✦</div>':''}
          <div class="msg-bubble">${m.t.replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>')}</div>
        </div>`;
      }).join('');

      return `<div class="chat-shell">
        <div class="section-tag">Assistente</div>
        <div class="chat-list">${conf}${bubbles}<div id="end"></div></div>
      </div>`;
    }

    function renderMetas(){
      const cards=data.goals.map(g=>{
        const pct=Math.min(100,Math.round((g.current/g.target)*100));
        return `<div class="goal-item">
          <div class="goal-top">
            <div class="goal-info">
              <div class="goal-ico">${g.icon}</div>
              <div>
                <div class="goal-name">${g.name}</div>
                <div class="goal-rem">Faltam ${fmt(Math.max(0,g.target-g.current))}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="goal-pct" style="color:${g.color}">${pct}%</div>
              <button class="goal-del" onclick="delGoal(${g.id})">×</button>
            </div>
          </div>
          <div class="goal-bar"><div class="goal-fill" style="width:${pct}%;background:${g.color}"></div></div>
          <div class="goal-nums">
            <span style="color:${g.color}">${fmt(g.current)}</span>
            <span>meta ${fmt(g.target)}</span>
          </div>
        </div>`;
      }).join('');

      const empty=!data.goals.length?`<div class="empty"><div class="empty-icon">🎯</div>Você ainda não criou metas.</div>`:'';
      return `<div class="section-tag">Suas metas</div>${empty}${cards}<button class="add-btn" onclick="openGoalModal()">+ nova meta</button>`;
    }

    function renderParcelas(){
      const parcelas=data.transactions.filter(t=>t.isInstallment && t.type==='expense');
      const totalMensal=parcelas.reduce((s,t)=>s+monthlyExpenseValue(t),0);
      const totalFaltando=parcelas.reduce((s,t)=>{
        const total=t.installments||1;
        const atual=t.installmentCurrent||1;
        const valor=monthlyExpenseValue(t);
        return s + Math.max(0,(total-atual)*valor);
      },0);

      if(!parcelas.length){
        return `
          <div class="section-tag">Parcelas</div>
          <div class="stat-grid" style="margin-top:4px">
            <div class="stat-box">
              <div class="stat-lbl">Peso no mês</div>
              <div class="stat-val">${fmt(0)}</div>
              <div class="stat-sub">em parcelas ativas</div>
            </div>
            <div class="stat-box">
              <div class="stat-lbl">Saldo parcelado</div>
              <div class="stat-val">${fmt(0)}</div>
              <div class="stat-sub">faltando pagar</div>
            </div>
          </div>
          <div class="empty">
            <div class="empty-icon">💳</div>
            Nenhuma compra parcelada ainda.
          </div>`;
      }

      const cards=parcelas.map(t=>{
        const total=t.installments||1;
        const atual=t.installmentCurrent||1;
        const valorParcela=monthlyExpenseValue(t);
        const faltamParcelas=Math.max(0,total-atual);
        const faltamValor=valorParcela*faltamParcelas;
        const pct=Math.round((atual/total)*100);

        return `
          <div class="parcel-card">
            <div class="goal-top">
              <div class="goal-info">
                <div class="goal-ico">💳</div>
                <div>
                  <div class="goal-name">${t.description}</div>
                  <div class="goal-rem">${t.category} · ${new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div>
                </div>
              </div>
              <div class="goal-pct" style="color:var(--yellow)">${atual}/${total}</div>
            </div>
            <div class="goal-bar">
              <div class="goal-fill" style="width:${pct}%;background:var(--yellow)"></div>
            </div>
            <div class="goal-nums">
              <span style="color:var(--text)">parcela ${fmt(valorParcela)}</span>
              <span>faltam ${fmt(faltamValor)}</span>
            </div>
            <div class="parcel-actions">
              <button class="parcel-btn primary" onclick="advanceInstallment(${t.id})"${atual>=total?' disabled':''}>Avançar parcela</button>
              <button class="parcel-btn" onclick="delTx(${t.id})">Remover</button>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="section-tag">Parcelas</div>

        <div class="stat-grid" style="margin-top:4px">
          <div class="stat-box">
            <div class="stat-lbl">Peso no mês</div>
            <div class="stat-val" style="color:var(--yellow)">${fmt(totalMensal)}</div>
            <div class="stat-sub">${parcelas.length} ${parcelas.length===1?'compra ativa':'compras ativas'}</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Saldo parcelado</div>
            <div class="stat-val">${fmt(totalFaltando)}</div>
            <div class="stat-sub">faltando pagar</div>
          </div>
        </div>

        ${cards}
        <div style="height:92px"></div>`;
    }

    function renderSaude(){
      const {exp}=totals();
      const renda=data.renda||0;
      const limite=data.limiteGastos||renda;
      const dias=diasNoMes();
      const diaAtual_=diaAtual();
      const diasRestantes=dias-diaAtual_+1;
      const gastoHoje=data.transactions
        .filter(t=>t.type==='expense'&&t.date===today())
        .reduce((s,t)=>s+monthlyExpenseValue(t),0);
      const podeGastarDia=diasRestantes>0?Math.max(0,(limite-exp)/diasRestantes):0;
      const pctGasto=limite>0?Math.min(100,Math.round((exp/limite)*100)):0;
      const sobra=limite-exp;

      let alertas='';
      if(!renda){
        alertas=`<div class="alert-box alert-warn">Configure sua renda mensal para liberar alertas mais inteligentes.</div>`;
      }else{
        if(pctGasto>=100) alertas+=`<div class="alert-box alert-danger">Você ultrapassou seu limite de gastos este mês.</div>`;
        else if(pctGasto>=80) alertas+=`<div class="alert-box alert-warn">Você já usou ${pctGasto}% do limite. Hora de desacelerar um pouco.</div>`;
        else alertas+=`<div class="alert-box alert-ok">Seus gastos seguem dentro do esperado.</div>`;

        if(gastoHoje>podeGastarDia&&podeGastarDia>0){
          alertas+=`<div class="alert-box alert-warn">Hoje você gastou ${fmt(gastoHoje)}, acima da média ideal de ${fmt(podeGastarDia)}/dia.</div>`;
        }
      }

      const dicasHTML=document.getElementById('dicas-content')
        ? document.getElementById('dicas-content').innerHTML
        : `<div class="dica-loading">Clique em "Gerar dicas" para receber sugestões personalizadas.</div>`;

      return `
        <div class="section-tag">Saúde financeira</div>

        <div class="saude-card">
          <div class="saude-title">Configurações do mês</div>
          <div class="saude-row">
            <div class="saude-half">
              <div class="saude-lbl">Renda mensal</div>
              <input class="saude-input" type="number" placeholder="R$ 0" value="${renda||''}" onchange="saveConfig('renda',this.value)" oninput="saveConfig('renda',this.value)">
            </div>
            <div class="saude-half">
              <div class="saude-lbl">Limite de gastos</div>
              <input class="saude-input" type="number" placeholder="R$ 0" value="${data.limiteGastos||''}" onchange="saveConfig('limiteGastos',this.value)" oninput="saveConfig('limiteGastos',this.value)">
            </div>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-lbl">Pode gastar por dia</div>
            <div class="stat-val" style="color:${podeGastarDia>0?'var(--green)':'var(--red)'}">${fmt(podeGastarDia)}</div>
            <div class="stat-sub">${diasRestantes} dias restantes</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Sobra do limite</div>
            <div class="stat-val" style="color:${sobra>=0?'var(--text)':'var(--red)'}">${fmt(sobra)}</div>
            <div class="stat-sub">${pctGasto}% utilizado</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Gasto hoje</div>
            <div class="stat-val">${fmt(gastoHoje)}</div>
            <div class="stat-sub">ideal: ${fmt(podeGastarDia)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Total gasto</div>
            <div class="stat-val" style="color:var(--red)">${fmt(exp)}</div>
            <div class="stat-sub">este mês</div>
          </div>
        </div>

        <div class="saude-card">
          <div class="saude-title">Alertas</div>
          ${alertas}
        </div>

        <div class="saude-card" style="margin-bottom:92px">
          <div class="saude-title">Dicas personalizadas</div>
          <div id="dicas-content">${dicasHTML}</div>
          <button class="gerar-btn" id="dicas-btn" onclick="gerarDicas()" ${dicasLoading?'disabled':''}>
            ${dicasLoading?'Gerando dicas...':'Gerar dicas'}
          </button>
        </div>`;
    }

    function toggleAcc(key){
      accOpen[key]=!accOpen[key];
      document.getElementById('body-'+key).classList.toggle('open',accOpen[key]);
      document.getElementById('arr-'+key).classList.toggle('open',accOpen[key]);
    }

    function scrollEnd(){
      setTimeout(()=>{
        const e=document.getElementById('end');
        if(e)e.scrollIntoView({behavior:'smooth'});
      },50);
    }

    function toggleSend(v){
      const b=document.getElementById('send-btn');
      if(b)b.className='send'+(v.trim()?' on':'');
    }

    function detectDate(txt){
      const l=txt.toLowerCase();
      const d=new Date();
      if(/anteontem/.test(l)) d.setDate(d.getDate()-2);
      else if(/ontem/.test(l)) d.setDate(d.getDate()-1);
      else if(/amanhã|amanha/.test(l)) d.setDate(d.getDate()+1);
      return d.toISOString().split('T')[0];
    }

    function detectInstallments(txt){
      const l=txt.toLowerCase();
      const match=l.match(/(\d{1,2})\s*x\s*(?:de\s*)?(\d+(?:[.,]\d+)?)/i);
      if(!match) return null;
      return {
        count: parseInt(match[1],10),
        amount: parseFloat(match[2].replace(',','.'))
      };
    }

    function normalizeText(txt){
      return txt
        .toLowerCase()
        .replace(/á|à|ã|â/g,'a')
        .replace(/é|ê/g,'e')
        .replace(/í/g,'i')
        .replace(/ó|ô|õ/g,'o')
        .replace(/ú/g,'u')
        .replace(/ç/g,'c');
    }

    function inferCategory(l){
      if(/almoco|janta|jantar|lanche|cafe|cafezinho|restaurante|ifood|mercado|mercadinho|supermercado|padaria|burger|hamburg|pizza|acai/.test(l)) return 'alimentação';
      if(/uber|99|busao|onibus|metro|gasolina|gasosa|combustivel|estacionamento|transporte/.test(l)) return 'transporte';
      if(/netflix|spotify|cinema|cineminha|jogo|game|festa|bar|role|lazer|show/.test(l)) return 'lazer';
      if(/farmacia|medico|dentista|academia|saude|remedio|hospital|consulta/.test(l)) return 'saúde';
      if(/aluguel|alugas|condominio|energia|luz|agua|internet|moradia|gas|conta de casa/.test(l)) return 'moradia';
      if(/curso|livro|escola|faculdade|facul|mensalidade|educacao/.test(l)) return 'educação';
      if(/salario|folha|pagamento mensal/.test(l)) return 'salário';
      if(/freelance|freela|trampei|job|cliente|projeto|extra|pix que recebi/.test(l)) return 'freelance';
      if(/investimento|acao|fundo|tesouro|cdb|aporte|cripto/.test(l)) return 'investimento';
      return 'outros';
    }

    function inferType(l){
      return /recebi|ganhei|entrou|renda|salario|freela|freelance|trampei|cliente|job|pix que recebi|me pagaram|caiu/.test(l)
        ? 'income'
        : 'expense';
    }

    function extractAmount(txt){
      const installment=detectInstallments(txt);
      if(installment) return installment.amount;

      const m=txt.match(/R?\$?\s?(\d+(?:[.,]\d+)?)/);
      if(!m) return null;
      return parseFloat(m[1].replace(',','.'));
    }

    function buildDescription(txt){
      return txt.trim().slice(0,48);
    }

    function parseTx(txt){
      const l=normalizeText(txt);
      const amount=extractAmount(txt);
      if(!amount) return null;

      const installment=detectInstallments(txt);
      const category=inferCategory(l);
      const type=inferType(l);

      return{
        id:Date.now(),
        type,
        amount: installment ? installment.amount : amount,
        category,
        description:buildDescription(txt),
        date:detectDate(txt),
        installments: installment ? installment.count : null,
        installmentAmount: installment ? installment.amount : null,
        installmentCurrent: installment ? 1 : null,
        isInstallment: !!installment
      };
    }

    function localReply(txt, parsed){
      if(parsed){
        const tipo = parsed.type === 'income' ? 'entrada' : 'gasto';
        const sinal = parsed.type === 'income' ? '+' : '-';
        const when = parsed.date === today() ? 'hoje' : 'na data informada';
        const parcelado = parsed.installments ? ` em ${parsed.installments}x` : '';
        const valor = parsed.type === 'expense' ? monthlyExpenseValue(parsed) : parsed.amount;
        return `Entendi ${tipo} de ${sinal}${fmt(valor)}${parcelado} em ${parsed.category}, ${when}. Você pode confirmar nos botões ou responder "sim".`;
      }

      if(/oi|olá|ola|bom dia|boa tarde|boa noite/i.test(txt)){
        return 'Oi! Você pode mandar algo como "gastei 20 no busao ontem", "ganhei 300 no freela" ou "paguei 3x de 120 no celular".';
      }

      if(/saldo|quanto tenho|quanto sobrou/i.test(txt)){
        const {bal}=totals();
        return `Seu saldo atual é ${fmt(bal)}.`;
      }

      if(/ajuda|como funciona/i.test(txt)){
        return 'Você pode registrar entradas e saídas direto pelo chat, inclusive com gíria, data simples e compra parcelada.';
      }

      return 'Me fala um gasto ou ganho com valor, por exemplo: *"gastei 20 no uber ontem"* ou *"comprei em 3x de 120"*.';
    }

    function localDicas(){
      const {exp,bal}=totals();
      const renda=data.renda||0;
      const limite=data.limiteGastos||0;
      const expByCat=data.transactions.filter(t=>t.type==='expense').reduce((a,t)=>{a[t.category]=(a[t.category]||0)+monthlyExpenseValue(t);return a;},{});
      const topCat=Object.entries(expByCat).sort((a,b)=>b[1]-a[1])[0];
      const dicas=[];

      if(!renda){
        dicas.push('Defina sua renda mensal para liberar uma leitura mais fiel da sua saúde financeira.');
      }

      if(limite && exp > limite){
        dicas.push(`Você já passou do limite em ${fmt(exp-limite)}. Vale cortar gastos variáveis até o fim do mês.`);
      }else if(limite && exp > limite*0.8){
        dicas.push(`Você já usou ${Math.round((exp/limite)*100)}% do limite. Tente segurar compras menos urgentes.`);
      }else if(limite){
        dicas.push('Seu ritmo de gastos está saudável. Continue acompanhando antes de compras maiores.');
      }

      if(topCat){
        dicas.push(`Seu maior centro de gasto hoje é ${topCat[0]} (${fmt(topCat[1])}). Esse é o melhor lugar para buscar economia.`);
      }else{
        dicas.push('Adicione algumas transações para receber dicas mais personalizadas.');
      }

      if(bal < 0){
        dicas.push('Seu saldo está negativo. Priorize entradas, corte excessos e registre tudo para recuperar o controle.');
      }else{
        dicas.push('Seu saldo está positivo. Se conseguir, separe parte dele para reserva ou para uma meta.');
      }

      return dicas.slice(0,3);
    }

    async function send(){
      const inp=document.getElementById('chat-in');
      const txt=inp.value.trim();
      if(!txt||loading)return;

      inp.value='';
      toggleSend('');

      const lower=normalizeText(txt);

      if(pending && /^(sim|s|confirmar|confirma|ok|pode salvar|salvar|fecha)$/.test(lower)){
        msgs.push({r:'user',t:txt});
        data.transactions.push({...pending});
        save();
        const valor = pending.type==='expense' ? monthlyExpenseValue(pending) : pending.amount;
        msgs.push({r:'bot',t:`Perfeito. Registro salvo: ${pending.type==='income'?'+':'-'}${fmt(valor)} em ${pending.category} ✅`});
        pending=null;
        updateHeader();
        render();
        scrollEnd();
        return;
      }

      if(pending && /^(nao|n|cancelar|cancela|deixa|deixa quieto)$/.test(lower)){
        msgs.push({r:'user',t:txt});
        pending=null;
        msgs.push({r:'bot',t:'Tudo bem, cancelei esse registro.'});
        render();
        scrollEnd();
        return;
      }

      msgs.push({r:'user',t:txt});
      msgs.push({r:'typing'});
      render();
      scrollEnd();
      loading=true;

      const parsed=parseTx(txt);

      setTimeout(()=>{
        msgs=msgs.filter(m=>m.r!=='typing');
        msgs.push({r:'bot',t:localReply(txt,parsed)});
        if(parsed) pending=parsed;
        loading=false;
        render();
        scrollEnd();
      },500);
    }

    function okTx(){
      if(!pending)return;
      data.transactions.push({...pending});
      save();
      pending=null;
      updateHeader();
      render();
      scrollEnd();
    }

    function nopeTx(){
      pending=null;
      render();
    }

    function delTx(id){
      data.transactions=data.transactions.filter(t=>t.id!==id);
      save();
      updateHeader();
      render();
    }

    function addMonthsToDate(isoDate, months){
      const d=new Date(`${isoDate}T12:00:00`);
      d.setMonth(d.getMonth()+months);
      return d.toISOString().split('T')[0];
    }

    function advanceInstallment(id){
      const tx=data.transactions.find(t=>t.id===id);
      if(!tx || !tx.isInstallment) return;

      const total=tx.installments||1;
      const current=tx.installmentCurrent||1;

      if(current>=total) return;

      tx.installmentCurrent=current+1;
      tx.date=addMonthsToDate(tx.date,1);
      save();
      updateHeader();
      render();
    }

    function delGoal(id){
      data.goals=data.goals.filter(g=>g.id!==id);
      save();
      render();
      updateHeader();
    }

    function saveConfig(key,val){
      data[key]=parseFloat(val)||0;
      save();
      if(tab==='saude') document.getElementById('content').innerHTML=renderSaude();
    }

    async function gerarDicas(){
      if(dicasLoading)return;
      dicasLoading=true;

      const btn=document.getElementById('dicas-btn');
      if(btn){
        btn.disabled=true;
        btn.textContent='Gerando dicas...';
      }

      const el=document.getElementById('dicas-content');
      if(el)el.innerHTML=`<div class="dica-loading">Analisando seus dados...</div>`;

      setTimeout(()=>{
        const dicas=localDicas().map(d=>`<div class="dica-card">${d}</div>`).join('');
        const target=document.getElementById('dicas-content');
        if(target) target.innerHTML=dicas||`<div class="dica-card">Adicione mais transações para receber sugestões melhores.</div>`;

        dicasLoading=false;
        const btn2=document.getElementById('dicas-btn');
        if(btn2){
          btn2.disabled=false;
          btn2.textContent='Atualizar dicas';
        }
      },500);
    }

    function openGoalModal(){
      selEmo='✈️';
      document.getElementById('g-name').value='';
      document.getElementById('g-target').value='';
      document.getElementById('g-cur').value='';
      document.getElementById('emo-grid').innerHTML=EMOJIS.map(e=>`<button type="button" class="emo${e===selEmo?' on':''}" onclick="pickEmo('${e}')">${e}</button>`).join('');
      document.getElementById('goal-modal').style.display='flex';
    }

    function closeGoal(){
      document.getElementById('goal-modal').style.display='none';
    }

    function pickEmo(e){
      selEmo=e;
      document.querySelectorAll('.emo').forEach(b=>b.classList.toggle('on',b.textContent===e));
    }

    function saveGoal(){
      const name=document.getElementById('g-name').value.trim();
      const target=parseFloat(document.getElementById('g-target').value)||0;
      const cur=parseFloat(document.getElementById('g-cur').value)||0;
      if(!name||!target)return;

      data.goals.push({
        id:Date.now(),
        name,
        target,
        current:cur,
        icon:selEmo,
        color:COLORS[data.goals.length%COLORS.length]
      });

      save();
      closeGoal();
      render();
      updateHeader();
    }

    updateHeader();
    render();
  </script>
</body>
</html>
